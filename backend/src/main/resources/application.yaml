server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/his?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT配置
jwt:
  secret: aXJ2dW5kZWZpbmVkLWJ1dC1yZWFsbHktbG9uZy1zZWNyZXQta2V5
  expiration: 86400000
  refresh-expiration: 604800000
  header: "Authorization"
  token-prefix: "Bearer "

springdoc:
  # API 文檔配置
  api-docs:
    enabled: true
    path: /v3/api-docs
    # resolve-schema-properties: true # ⚠️ 關鍵：禁用 schema 屬性解析
    # 禁用泛型類型自動解析
    default-produces-media-type: application/json
    default-consumes-media-type: application/json
  writer-with-default-pretty-printer: true
  # Swagger UI 配置
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: JavaFX API
        url: /v3/api-docs
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true

  # 掃描配置 - 限制掃描範圍
  packages-to-scan: com.example.controller
  paths-to-match: /api/**

  # ⚠️ 禁用所有自動生成的功能
  model-and-view-allowed: false
  show-actuator: false
  auto-tag: false
  override-with-generic-response: false

# 日誌配置
logging:
  level:
    com.example: DEBUG
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: logs/app.log
    charset: UTF-8

# 文件上传配置
file:
  upload:
    path: E:\xaingmu\test\javaFx-api\uploads # Linux/Mac路径，Windows使用 D:/uploads/photos
  access:
    url: http://localhost:8080/uploads
